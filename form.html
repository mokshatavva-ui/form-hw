<body>
    <h1>personal detail form </h1>
    <form>
      <label>name</label><br>
      <input type="text" id="name"><br><br>
      <label>e mail id </label>
      <input type="text" id="email"><br><br>
      <label>contact number(this will be hidden)</label><br>
      <input type="password" id="contact"><br><br>
      <label>gender</label><br>
      <input type="radio" name="gender" id="female" value="female">female<br>
      <input type="radio" name="gender" id="male" value="male"> male<br><br>
      <label> Favorite city </label><br>
      <input type="checkbox" name="new delhi" id="city" value="new delhi">new delhi<br>
      <input type="checkbox" name="mumbai" id="city" value="mumbai">mumbai <br>
      <input type="checkbox" name="Hyderabad" id="city" value="Hyderabad">hyderabad <br><br>
      
      <label>parent name</label><br>
      <input type="text" id="name"><br><br>
      <label>date of birth</label><br>
      <input type="date" id="birth"><br><br>
      <label> mother tongue </label><br>
      <input type="checkbox" name="english" id="language">english <br>
      <input type="checkbox" name="telugu" id="language">telugu <br>
      <input type="checkbox" name="hindi" id="language">hindi <br><br>
    <input type="submit"><br>
    </form>
